# Uptime check for the chat backend. GitHub emails the workflow's last
# editor when a scheduled run fails. Set the CHAT_HEALTH_URL repository
# variable (Settings -> Secrets and variables -> Actions -> Variables),
# e.g. https://ask.casim.net/health — the check is skipped while unset.
name: Chat backend uptime
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Probe /health
        env:
          URL: ${{ vars.CHAT_HEALTH_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "CHAT_HEALTH_URL variable not set - skipping."
            exit 0
          fi
          for attempt in 1 2 3; do
            if curl -fsS --max-time 10 "$URL" > /dev/null; then
              echo "Healthy."
              exit 0
            fi
            echo "Attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          echo "::error::Chat backend health check failed: $URL"
          exit 1
