# Performance regression guard for the Astro site.
# Budgets (astro/lighthouserc.json): performance >= 95, SEO = 100,
# accessibility >= 95, total JS < 100 KB. Fails the build on regression.
name: Lighthouse CI
on:
  push:
    branches: [master]
    paths: ['astro/**', '.github/workflows/lighthouse-ci.yml']
  pull_request:
    paths: ['astro/**', '.github/workflows/lighthouse-ci.yml']

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: astro/package-lock.json
      - run: npm ci
      # Build with production feature flags so the audit measures the real
      # payload (chat widget JS included).
      - run: npm run build
        env:
          PUBLIC_CHAT_ENDPOINT: ${{ vars.PUBLIC_CHAT_ENDPOINT || 'https://ask.casim.net' }}
          PUBLIC_UMAMI_SRC: ${{ vars.PUBLIC_UMAMI_SRC }}
          PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.PUBLIC_UMAMI_WEBSITE_ID }}
      - run: node scripts/check-contrast.mjs
      - run: npx --yes @lhci/cli@0.14.x autorun --config=lighthouserc.json
