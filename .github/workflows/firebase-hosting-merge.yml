name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      # RESUME_PHONE is optional; when the secret is unset the PDF omits the
      # phone entry. Resume data itself lives in lib/pdf/resume_constants.dart.
      - run: flutter build web --release --dart-define=RESUME_PHONE="${{ secrets.RESUME_PHONE }}"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RESUME_63067 }}
          channelId: live
          projectId: resume-63067
