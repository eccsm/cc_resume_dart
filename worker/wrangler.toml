name = "resume-chat"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Custom domain route — attach after `wrangler deploy` via the dashboard,
# or uncomment once the zone is on this Cloudflare account:
# routes = [{ pattern = "ask.casim.net", custom_domain = true }]

[vars]
ANTHROPIC_MODEL = "claude-haiku-4-5"
# Daily global request cap for /ask; the widget shows the "resting" message beyond it.
DAILY_CAP = "200"
# Daily global cap for ElevenLabs synthesis calls (cache hits don't count).
TTS_DAILY_CAP = "20"
# ElevenLabs premade voice "Adam" — swap for your own voice ID any time.
ELEVENLABS_VOICE_ID = "pNInz6obpgDQGcFmaJgB"
# Comma-separated origins allowed to call this API.
ALLOWED_ORIGINS = "https://casim.net,https://www.casim.net,http://localhost:4321"

[[kv_namespaces]]
binding = "KV"
# Create with: wrangler kv namespace create resume-chat-kv
# then paste the returned id here.
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "TTS_AUDIO"
# Create with: wrangler r2 bucket create resume-tts-audio
bucket_name = "resume-tts-audio"

# Secrets (set via `wrangler secret put <NAME>`):
#   ANTHROPIC_API_KEY   — Anthropic API key
#   ELEVENLABS_API_KEY  — ElevenLabs API key
#   IP_HASH_SALT        — any random string; salts the hashed-IP rate-limit keys
